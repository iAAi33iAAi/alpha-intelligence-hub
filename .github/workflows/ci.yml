name: CI

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]

            jobs:
              python-ci:
                  runs-on: ubuntu-latest
                      strategy:
                            matrix:
                                    python-version: ['3.11', '3.12']
                                        steps:
                                              - uses: actions/checkout@v4
                                                      with:
                                                                submodules: recursive
                                                                      - name: Set up Python ${{ matrix.python-version }}
                                                                              uses: actions/setup-python@v5
                                                                                      with:
                                                                                                python-version: ${{ matrix.python-version }}
                                                                                                      - name: Install dependencies
                                                                                                              run: |
                                                                                                                        python -m pip install --upgrade pip
                                                                                                                                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                                                                                                                                            pip install pytest pytest-cov
                                                                                                                                                  - name: Run Safety Kernel tests
                                                                                                                                                          run: |
                                                                                                                                                                    if [ -d "core/safety-kernel" ]; then
                                                                                                                                                                                cd core/safety-kernel
                                                                                                                                                                                            python -m pytest test_sk.py test_tamper.py -v
                                                                                                                                                                                                      else
                                                                                                                                                                                                                  echo "core/safety-kernel not found - run init-hub.sh first"
                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                  - name: Run Treasury tests
                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                    if [ -d "platform" ]; then
                                                                                                                                                                                                                                                                cd platform
                                                                                                                                                                                                                                                                            python -m pytest tests/ -v --cov=src
                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                  echo "platform/ not found - run init-hub.sh first"
                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                  - name: Run platform tests
                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                    if [ -d "tests" ]; then
                                                                                                                                                                                                                                                                                                                                                python -m pytest tests/ -v
                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                      echo "tests/ not found - skipping"
                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                  rust-ci:
                                                                                                                                                                                                                                                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                  submodules: recursive
                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Install Rust toolchain
                                                                                                                                                                                                                                                                                                                                                                                                                                uses: dtolnay/rust-toolchain@stable
                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Build Aethel Validator
                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ -d "core/undermoon/aethel-grid" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cd core/undermoon/aethel-grid
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cargo build --release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "core/undermoon/aethel-grid not found - run init-hub.sh first"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Test Aethel Validator
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ -d "core/undermoon/aethel-grid" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cd core/undermoon/aethel-grid
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cargo test --release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "Skipping - directory not migrated yet"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  solidity-ci:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  submodules: recursive
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Install Solidity compiler
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if [ -d "blockchain/world-tribe" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      sudo add-apt-repository -y ppa:ethereum/ethereum
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  sudo apt-get update
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              sudo apt-get install -y solc
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "blockchain/world-tribe not found - skipping solc install"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Compile contracts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if [ -d "blockchain/world-tribe/contracts" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  cd blockchain/world-tribe
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              solc --bin --abi contracts/*.sol -o build/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "No contracts found - run init-hub.sh first"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                integration:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        needs: [python-ci, rust-ci, solidity-ci]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    submodules: recursive
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Validate docker-compose
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if [ -f "docker-compose.yml" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        docker compose config --quiet
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "docker-compose.yml is valid"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "No docker-compose.yml found"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Verify hub structure
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "=== Alpha Intelligence Hub Structure ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "Files in repo:"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                find . -maxdepth 3 -type f | head -50
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "=== Migration status ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    for dir in core/safety-kernel platform core/undermoon blockchain/world-tribe gateway/openclaw; do
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if [ -d "$dir" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "[OK] $dir"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "[PENDING] $dir - needs init-hub.sh"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              done
