name: Alpha Intelligence Hub CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Python CI - Treasury, Safety Kernel, Platform
  python-ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run Safety Kernel tests
        run: |
          cd core/safety-kernel
          python -m pytest test_sk.py test_tamper.py -v
      - name: Run Treasury tests
        run: |
          cd platform
          python -m pytest tests/ -v --cov=src
      - name: Run platform tests
        run: python -m pytest tests/ -v

  # Rust CI - Aethel Grid Validator
  rust-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build Aethel Validator
        run: |
          cd core/undermoon/aethel-grid
          cargo build --release
      - name: Test Aethel Validator
        run: |
          cd core/undermoon/aethel-grid
          cargo test --release

  # Solidity CI - World-Tribe Protocol
  solidity-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Solidity tools
        run: |
          pip install py-solc-x
          pip install -r blockchain/world-tribe/requirements.txt 2>/dev/null || true
      - name: Compile WorldTribe contract
        run: |
          cd blockchain/world-tribe
          python scripts/compile_worldtribe.py
      - name: Test WorldTribe contract
        run: |
          cd blockchain/world-tribe
          python scripts/test_worldtribe.py

  # Integration CI - Full Stack
  integration:
    needs: [python-ci, rust-ci, solidity-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build all services
        run: docker compose build
      - name: Verify service health
        run: |
          docker compose up -d
          sleep 15
          docker compose ps
          docker compose down
